<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Terminal recording of mcpgen generating an MCP server from an OpenAPI spec">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="760" height="420" rx="12" fill="url(#bg)" stroke="#1f2630" stroke-width="1"/>
  <!-- title bar -->
  <rect x="0" y="0" width="760" height="38" rx="12" fill="#161b22"/>
  <rect x="0" y="20" width="760" height="18" fill="#161b22"/>
  <circle cx="22" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="19" r="6" fill="#27c93f"/>
  <text x="380" y="24" text-anchor="middle" fill="#8b949e" font-size="13">mcpgen — zsh</text>

  <g font-size="15">
    <!-- command -->
    <text x="24" y="74"><tspan fill="#3ddc97">$</tspan> <tspan fill="#e6edf3">npx mcpgen generate ./openapi.yaml --out ./my-server</tspan></text>

    <text x="24" y="108" fill="#8b949e">▸ parsing  </text>
    <text x="150" y="108" fill="#e6edf3">Swagger Petstore (openapi 3.1) — </text>
    <text x="455" y="108" fill="#3ddc97">5 tools</text>

    <text x="24" y="134" fill="#58a6ff">✔ plan</text>
    <text x="120" y="134" fill="#8b949e">proposed 5 MCP tools</text>

    <text x="24" y="160" fill="#58a6ff">✔ synthesize</text>
    <text x="160" y="160" fill="#8b949e">typed Zod inputs + handlers</text>

    <text x="24" y="186" fill="#58a6ff">✔ assemble</text>
    <text x="140" y="186" fill="#8b949e">14 files (server, http, deploy kit, README)</text>

    <!-- verify block -->
    <text x="24" y="218" fill="#e6edf3">verifying the server actually runs…</text>
    <text x="40" y="244" fill="#3ddc97">✔ install</text>
    <text x="160" y="244" fill="#3ddc97">✔ build</text>
    <text x="270" y="244" fill="#3ddc97">✔ boot</text>
    <text x="370" y="244" fill="#3ddc97">✔ smoke (5/5)</text>

    <!-- summary panel -->
    <rect x="24" y="266" width="600" height="106" rx="8" fill="none" stroke="#30363d"/>
    <text x="40" y="292" fill="#3ddc97" font-size="14">╭─ mcpgen · generated &amp; verified ─╮</text>
    <text x="40" y="316" fill="#e6edf3" font-size="14">server   swagger_petstore-mcp</text>
    <text x="40" y="338" fill="#e6edf3" font-size="14">tools    5      output   ./my-server</text>
    <text x="40" y="360" fill="#e6edf3" font-size="14">✔ installed · built · booted · smoke-tested</text>

    <text x="24" y="400"><tspan fill="#3ddc97">$</tspan> <tspan fill="#e6edf3">cd ./my-server &amp;&amp; node dist/server.js</tspan> <tspan fill="#3ddc97">▋</tspan></text>
  </g>
</svg>
