name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The dev toolchain's pnpm (11.8) requires Node >= 22.13, so CI runs on
        # 22. (The *generated* servers and the published CLI still target Node
        # 20+ — only the monorepo's own tooling needs 22+.)
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      # No `version:` — it's read from the `packageManager` field in package.json
      # (pnpm/action-setup errors if both are specified).
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage + thresholds)
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always() && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  # --- Security gate: dependency audit + OWASP secure-MCP lint -------------
  security:
    name: security (audit + secure-MCP lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (fail on high/critical)
        run: pnpm audit --prod --audit-level=high

      - name: Build (security lint imports the built core)
        run: pnpm build

      - name: OWASP secure-MCP lint (generated output + own source)
        run: pnpm security:lint
