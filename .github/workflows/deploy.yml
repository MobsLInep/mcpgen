name: Deploy

# Builds + pushes the web image on every push to main, and publishes the CLI to
# npm (with provenance) when a v* tag is pushed.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- Build + push the web UI image to GHCR -----------------------------
  web-image:
    name: build & push web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mcpgen-web
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Publish the CLI (+ core, templates) to npm on a v* tag ------------
  publish-cli:
    name: publish mcpgen to npm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      # Skip cleanly (job stays green) until npm publishing is configured. Set
      # the NPM_TOKEN repo secret to enable it; `secrets` can't be used in a
      # job-level `if`, so we gate the steps on this guard instead.
      - name: Check for npm token
        id: guard
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::notice::NPM_TOKEN secret not set — skipping npm publish. Add it (and create the @mcpgen npm org) to enable publishing."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.publish == 'true'

      - name: Install pnpm
        if: steps.guard.outputs.publish == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.guard.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.guard.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.guard.outputs.publish == 'true'
        run: pnpm build

      - name: Publish (mcpgenx + @mcpgen/core + @mcpgen/templates)
        # `publishConfig.provenance` is set in each package.json, so --provenance
        # is implied; pass it explicitly to be safe. Workspace deps are rewritten
        # to real versions by pnpm at publish time.
        if: steps.guard.outputs.publish == 'true'
        run: pnpm -r publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
